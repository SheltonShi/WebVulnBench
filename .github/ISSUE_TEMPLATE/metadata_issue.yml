name: Metadata issue
description: Report a problem in WebVulnBench metadata or counts.
title: "[metadata] "
labels: ["metadata"]
body:
  - type: input
    id: application
    attributes:
      label: Application ID
      placeholder: wordpress
    validations:
      required: true
  - type: input
    id: vuln_id
    attributes:
      label: Vulnerability ID
      placeholder: vuln_function_...
    validations:
      required: false
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: Describe the incorrect field, count, PoC, or Docker image reference.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected value
    validations:
      required: true
